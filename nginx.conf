server {
    listen 80; # Cambiado de 8080 a 80 para coincidir con tu mapeo de Docker -p 80:80
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: todas las rutas no encontradas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API de Ventas (Spring Boot — IP Privada del Backend)
    location /api/v1/ventas {
        # Usamos la IP directa para evitar el error "host not found in upstream"
        proxy_pass http://10.0.133.238:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para API de Despachos (Ajusta la IP si está en otra instancia)
    location /api/v1/despachos {
        proxy_pass http://10.0.133.238:8081; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
